name: fresh_market
description: Fresh Market - Product Catalog & Pricing Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  firebase_crashlytics: ^4.3.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Data serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  photo_view: ^0.15.0
  flutter_svg: ^2.0.10
  lottie: ^2.7.0

  # Utilities
  image_picker: ^1.0.7
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  logger: ^2.0.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code generation
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

  # Testing
  mockito: ^5.4.4
  mocktail: ^1.0.1

flutter:
  generate: true

  uses-material-design: true
